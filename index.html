<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Feedback form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>User Feedback form </h2>
  <form id="FeedbackForm" action="/submit-form" method="POST">
    <div>
      <label for="username">Username</label>
      <input type="text" id="userInput" name="username" required minlength="3" maxlength="15">
      <span class="error" id="userError"></span>
    </div>
    <div>
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" required>
      <span class="error" id="emailError"></span>
    </div>
    <div>
      <label for="age">Age</label>
      <input type="age" id="age" name="age" required minlength="18" maxlength="99">
      <span class="error" id="ageError"></span>
    </div>
    <div>
      <label for="feedback">Feedback</label>
      <textarea name="feedback" id="feedback" cols="30" rows="10" required  minlength="100" maxlength="500" disabled></textarea>
      <span class="error" id="feedbackError"></span>
    </div>
    <div>
      <button type="submit">Submit</button>
    </div>
  </form>
  <script src="practice06.js"></script>
</body>
</html>
